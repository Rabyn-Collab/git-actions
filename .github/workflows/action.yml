name: First WorkFlow
on: [push, workflow_dispatch]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Output Event
        run: echo "${{ toJson(github.event) }}"
      - name: Run a one-line script
        run: echo "Hello, world!"
      - name: Get Code
        uses: actions/checkout@v7
      - name: Install Dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint