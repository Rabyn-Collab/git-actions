name: First WorkFlow
on: [push]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line script
        run: echo "Hello, world!"
      - name: Get Code
        uses: actions/checkout@v6
      - name: Install Dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint

  build:
    needs: run
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: npm run build